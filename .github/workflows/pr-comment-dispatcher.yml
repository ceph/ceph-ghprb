# Manual PR comment dispatcher.
#
# This workflow handles developer comments like:
#   jenkins test poc
#   ok to test
#
# Production version will map commands like:
#   jenkins test make check
#   jenkins test api
#   jenkins test windows
#   jenkins test all
#
# Behavior:
# - Run only for comments on pull requests.
# - Ignore unrelated comments.
# - Verify commenter authorization.
# - Allow Ceph org members to approve external contributor PRs using "ok to test".
# - Skip Jenkins trigger if PR title contains [skip ci].
# - Call dispatch-jenkins-job.yml to handle Jenkins trigger and stale-build cleanup.

name: PR Comment Dispatcher POC

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: pr-comment-dispatch-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  parse-comment:
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest

    outputs:
      authorized: ${{ steps.auth.outputs.authorized }}
      commenter_is_ceph_member: ${{ steps.member.outputs.commenter_is_ceph_member }}
      trigger_poc: ${{ steps.parse.outputs.trigger_poc }}
      ok_to_test: ${{ steps.parse.outputs.ok_to_test }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      pr_sha: ${{ steps.pr.outputs.pr_sha }}
      skip_ci: ${{ steps.pr.outputs.skip_ci }}

    steps:
      - name: Parse comment
        id: parse
        shell: bash
        run: |
          set -euo pipefail

          body='${{ github.event.comment.body }}'
          normalized=$(printf '%s' "$body" | tr '[:upper:]' '[:lower:]' | xargs)

          if [[ "$normalized" == "jenkins test poc" ]]; then
            echo "trigger_poc=true" >> "$GITHUB_OUTPUT"
          else
            echo "trigger_poc=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$normalized" == "ok to test" ]]; then
            echo "ok_to_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok_to_test=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check commenter authorization
        id: auth
        shell: bash
        run: |
          set -euo pipefail

          user='${{ github.event.comment.user.login }}'
          repo='${{ github.repository }}'

          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$repo/collaborators/$user")

          if [[ "$status" == "204" ]]; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            echo "authorized=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if commenter is Ceph org member
        id: member
        shell: bash
        run: |
          set -euo pipefail

          user='${{ github.event.comment.user.login }}'
          response_file=$(mktemp)

          status=$(curl -sS -o "$response_file" -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CEPH_ORG_READ_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/ceph/memberships/$user")

          echo "membership_check_http_status=$status"

          if [[ "$status" == "200" ]]; then
            state=$(jq -r '.state // empty' "$response_file")
            role=$(jq -r '.role // empty' "$response_file")

            echo "membership_state=$state"
            echo "membership_role=$role"

            if [[ "$state" == "active" ]]; then
              echo "commenter_is_ceph_member=true" >> "$GITHUB_OUTPUT"
            else
              echo "commenter_is_ceph_member=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "commenter_is_ceph_member=false" >> "$GITHUB_OUTPUT"
            echo "Membership check response body:"
            cat "$response_file" || true
          fi    

      - name: Resolve PR metadata
        id: pr
        shell: bash
        run: |
          set -euo pipefail

          pr_number='${{ github.event.issue.number }}'
          pr_url='${{ github.event.issue.pull_request.url }}'

          pr_json=$(curl -s --fail \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$pr_url")

          pr_sha=$(echo "$pr_json" | jq -r '.head.sha')
          title=$(echo "$pr_json" | jq -r '.title')

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "pr_sha=$pr_sha" >> "$GITHUB_OUTPUT"

          if echo "$title" | grep -qi '\[skip ci\]'; then
            echo "skip_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_ci=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show comment decision inputs
        shell: bash
        run: |
          echo "authorized=${{ steps.auth.outputs.authorized }}"
          echo "commenter_is_ceph_member=${{ steps.member.outputs.commenter_is_ceph_member }}"
          echo "trigger_poc=${{ steps.parse.outputs.trigger_poc }}"
          echo "ok_to_test=${{ steps.parse.outputs.ok_to_test }}"
          echo "skip_ci=${{ steps.pr.outputs.skip_ci }}"

  trigger-poc:
    needs: parse-comment
    if: |
      needs.parse-comment.outputs.skip_ci != 'true' &&
      (
        (
          needs.parse-comment.outputs.trigger_poc == 'true' &&
          (
            needs.parse-comment.outputs.authorized == 'true' ||
            needs.parse-comment.outputs.commenter_is_ceph_member == 'true'
          )
        ) ||
        (
          needs.parse-comment.outputs.ok_to_test == 'true' &&
          needs.parse-comment.outputs.commenter_is_ceph_member == 'true'
        )
      )         
    uses: ./.github/workflows/dispatch-jenkins-job.yml
    secrets: inherit
    with:
      pr_number: ${{ needs.parse-comment.outputs.pr_number }}
      pr_sha: ${{ needs.parse-comment.outputs.pr_sha }}
      jenkins_job: preserve-ceph-pr-trigger-poc
      status_context: jenkins poc test
      trigger_method: Comment by ${{ github.event.comment.user.login }}
      triggered_by: https://github.com/${{ github.repository }}/pull/${{ github.event.issue.number }}#issuecomment-${{ github.event.comment.id }}
      dry_run: false
      post_pending_status: true
      cancel_only: false
      cancel_mode: stale
